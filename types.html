  <p class="page-eyebrow">ALL 16 TYPES</p>
  <h1>ギャンブラー16タイプ一覧</h1>
  <p class="page-lead">あなたはどのタイプ?全16タイプの個性をチェック。カードをタップすると、そのタイプの診断結果を表示します。</p>

<script src="data.js"></script>
<script src="avatar.js"></script>
<script>
  (function () {
    var order = ["BIHW","BIHF","BICW","BICF","BLHW","BLHF","BLCW","BLCF",
                 "SIHW","SIHF","SICW","SICF","SLHW","SLHF","SLCW","SLCF"];
    var grid = document.getElementById("type-grid");
    order.forEach(function (code) {
      var t = CHARACTERS[code];
      if (!t) return;
      var a = document.createElement("a");
      a.className = "type-card";
      a.href = "index.html?type=" + code;
      a.innerHTML =
        '<div class="tc-top"><span class="tc-emoji">' + gamblerAvatar(code, 52) + '</span><span class="tc-code">' + code + '</span></div>' +
        '<div class="tc-name">' + t.name + '</div>' +
        '<div class="tc-copy">' + t.copy + '</div>' +
        '<div class="tc-desc">' + t.desc + '</div>' +
        '<div class="tc-quote">「' + t.quote + '」</div>';
      grid.appendChild(a);
    });
  })();
</script>
</body>
